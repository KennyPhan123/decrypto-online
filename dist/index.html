<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="DECRYPTO - Board game online. Truyền mã bí mật cho đồng đội mà không để đối phương chặn được!" />
  <title>DECRYPTO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script type="module" crossorigin src="/assets/index-DlBRUxB8.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-pXDAztg5.css">
</head>
<body>

  <!-- ─── HOME SCREEN ─── -->
  <div id="home-screen" class="screen active">
    <div class="home-container">
      <div class="logo">
        <h1>DECRYPTO</h1>
        <p class="subtitle">Giải mã. Chặn mã. Chiến thắng.</p>
      </div>

      <div class="home-form">
        <div class="input-group">
          <label for="player-name">Tên của bạn</label>
          <input type="text" id="player-name" placeholder="Nhập tên..." maxlength="20" autocomplete="off" />
        </div>
        
        <div class="input-group">
          <label for="room-code-input">Mã phòng (để trống nếu tạo mới)</label>
          <input type="text" id="room-code-input" placeholder="Nhập mã phòng..." maxlength="4" autocomplete="off" style="text-transform:uppercase" />
        </div>

        <button id="btn-join" class="btn btn-primary" style="margin-top: 8px;">Vào phòng</button>
        <div class="divider"><span>hoặc</span></div>
        <button id="btn-create" class="btn btn-secondary">Tạo phòng mới</button>
      </div>
    </div>
  </div>

  <!-- ─── LOBBY SCREEN ─── -->
  <div id="lobby-screen" class="screen">
    <div class="lobby-container">
      <h2>DECRYPTO</h2>

      <div class="room-code-display">
        <span class="room-code-label">Mã phòng</span>
        <div class="room-code-box">
          <span id="room-code-text"></span>
          <button id="btn-copy-code" class="btn-icon" title="Sao chép">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>
      </div>

      <div id="lobby-mode-info" class="mode-info"></div>

      <div id="lobby-teams" class="lobby-teams">
        <div class="team-column">
          <h3 class="team-header team-a-header">Đội Trắng</h3>
          <ul id="team-a-list" class="team-list"></ul>
        </div>
        <div class="team-column">
          <h3 class="team-header team-b-header">Đội Đen</h3>
          <ul id="team-b-list" class="team-list"></ul>
        </div>
      </div>
      
      <button id="btn-switch-team" class="btn btn-secondary btn-small" style="margin-bottom: 16px;">Đổi phe</button>

      <button id="btn-start" class="btn btn-primary" style="display:none">Bắt đầu</button>
      <p id="lobby-waiting" class="waiting-text">Đang chờ chủ phòng bắt đầu...</p>
    </div>
  </div>

  <!-- ─── GAME SCREEN ─── -->
  <div id="game-screen" class="screen">
    <div class="game-container">

      <!-- Top Bar -->
      <div class="game-topbar">
        <div class="topbar-left">
          <div class="topbar-round">
            <span class="topbar-label">Vòng</span>
            <span id="round-display" class="topbar-value">1/8</span>
          </div>
          <div id="player-identity" class="player-identity"></div>
        </div>
        <div id="topbar-right">
          <div id="topbar-timer" class="topbar-timer" style="display:none">60s</div>
          <div id="topbar-tokens" class="topbar-tokens"></div>
        </div>
      </div>

      <!-- Keywords Panel (own team only) -->
      <div id="keywords-panel" class="keywords-panel" style="display:none">
        <div class="keywords-title">Từ khoá của bạn</div>
        <div id="keywords-list" class="keywords-list"></div>
      </div>

      <!-- Phase Status -->
      <div id="phase-status" class="phase-status"></div>

      <!-- Action Area (changes per phase) -->
      <div id="action-area" class="action-area"></div>

      <!-- History Panel -->
      <div id="history-panel" class="history-panel">
        <div class="history-header" id="history-toggle">
          <span>Lịch sử gợi ý</span>
          <svg class="history-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div id="history-content" class="history-content">
          <div id="history-tables"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- ─── GAME OVER SCREEN ─── -->
  <div id="gameover-screen" class="screen">
    <div class="gameover-container">
      <h2 id="gameover-title"></h2>
      <div id="gameover-summary" class="gameover-summary"></div>
      <div id="gameover-keywords" class="gameover-keywords"></div>
      <button id="btn-play-again" class="btn btn-primary" style="display:none">Chơi lại</button>
      <button id="btn-back-home" class="btn btn-secondary">Về trang chủ</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

</body>
</html>
