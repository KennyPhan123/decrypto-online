<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="description" content="DECRYPTO - Board game online. Truyền mã bí mật cho đồng đội mà không để đối phương chặn được!" />
  <title>DECRYPTO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/styles.css" />
  <link rel="icon" type="image/png" href="/favicon.png" />
</head>
<body>

  <!-- ─── HOME SCREEN ─── -->
  <div id="home-screen" class="screen active">
    <div class="home-container">
      <div class="logo">
        <h1>DECRYPTO</h1>
      </div>

      <div class="home-form" id="menu-main">
        <button id="btn-menu-create" class="btn btn-primary">Tạo phòng mới</button>
        <button id="btn-menu-join" class="btn btn-secondary">Vào phòng</button>
      </div>

      <div class="home-form" id="menu-create" style="display:none">
        <div class="input-group">
          <label for="create-name">Tên của bạn</label>
          <input type="text" id="create-name" placeholder="Nhập tên..." maxlength="20" autocomplete="off" />
        </div>
        <button id="btn-create" class="btn btn-primary" style="margin-top: 8px;">Xác nhận tạo</button>
        <button id="btn-back-create" class="btn btn-secondary btn-small" style="margin-top: 8px;">Quay lại</button>
      </div>

      <div class="home-form" id="menu-join" style="display:none">
        <div class="input-group">
          <label for="join-name">Tên của bạn</label>
          <input type="text" id="join-name" placeholder="Nhập tên..." maxlength="20" autocomplete="off" />
        </div>
        <div class="input-group">
          <label for="join-code">Mã phòng</label>
          <input type="text" id="join-code" placeholder="Nhập mã phòng..." maxlength="4" autocomplete="off" style="text-transform:uppercase" />
        </div>
        <button id="btn-join" class="btn btn-primary" style="margin-top: 8px;">Xác nhận vào</button>
        <button id="btn-back-join" class="btn btn-secondary btn-small" style="margin-top: 8px;">Quay lại</button>
      </div>
    </div>
  </div>

  <!-- ─── LOBBY SCREEN ─── -->
  <div id="lobby-screen" class="screen">
    <div class="lobby-container">
      <h2>DECRYPTO</h2>

      <div class="room-code-display">
        <span class="room-code-label">Mã phòng</span>
        <div class="room-code-box">
          <span id="room-code-text"></span>
          <button id="btn-copy-code" class="btn-icon" title="Sao chép">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          </button>
        </div>
      </div>

      <div id="lobby-mode-info" class="mode-info"></div>

      <div id="lobby-teams" class="lobby-teams">
        <div class="team-column" id="team-a-col">
          <h3 class="team-header team-a-header" id="team-a-title">Đội Trắng</h3>
          <ul id="team-a-list" class="team-list"></ul>
        </div>
        <div class="team-column" id="team-b-col">
          <h3 class="team-header team-b-header" id="team-b-title">Đội Đen</h3>
          <ul id="team-b-list" class="team-list"></ul>
        </div>
      </div>

      <button id="btn-start" class="btn btn-primary" style="display:none">Bắt đầu</button>
      <p id="lobby-waiting" class="waiting-text">Đang chờ chủ phòng bắt đầu...</p>
    </div>
  </div>

  <!-- ─── GAME SCREEN ─── -->
  <div id="game-screen" class="screen">
    <div class="game-container">

      <!-- Top Bar -->
      <div class="game-topbar">
        <div class="topbar-left">
          <div class="topbar-round">
            <span class="topbar-label">Vòng</span>
            <span id="round-display" class="topbar-value">1/8</span>
          </div>
          <div id="player-identity" class="player-identity"></div>
        </div>
        <div id="topbar-right">
          <div id="topbar-timer" class="topbar-timer" style="display:none">60s</div>
          <div id="topbar-tokens" class="topbar-tokens"></div>
        </div>
      </div>

      <!-- Keywords Panel (own team only) -->
      <div id="keywords-panel" class="keywords-panel" style="display:none">
        <div class="keywords-title">Từ khoá của bạn</div>
        <div id="keywords-list" class="keywords-list"></div>
      </div>

      <!-- Phase Status -->
      <div id="phase-status" class="phase-status"></div>

      <!-- Action Area (changes per phase) -->
      <div id="action-area" class="action-area"></div>

      <!-- History Panel -->
      <div id="history-panel" class="history-panel">
        <div class="history-header" id="history-toggle">
          <span>Lịch sử gợi ý</span>
          <svg class="history-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
        <div id="history-content" class="history-content">
          <div id="history-tables"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- ─── GAME OVER SCREEN ─── -->
  <div id="gameover-screen" class="screen">
    <div class="gameover-container">
      <h2 id="gameover-title"></h2>
      <div id="gameover-summary" class="gameover-summary"></div>
      <div id="gameover-keywords" class="gameover-keywords"></div>
      <button id="btn-play-again" class="btn btn-primary" style="display:none">Chơi lại</button>
      <button id="btn-back-home" class="btn btn-secondary">Về trang chủ</button>
    </div>
  </div>

  <!-- ─── CHAT UI ─── -->
  <div id="chat-container" class="chat-container" style="display:none">
    <button id="chat-toggle" class="chat-toggle">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
      <span id="chat-badge" class="chat-badge" style="display:none">0</span>
    </button>
    <div id="chat-panel" class="chat-panel" style="display:none">
      <div class="chat-header">
        <span>Kênh nội bộ</span>
        <button id="chat-close" class="btn-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <form id="chat-form" class="chat-form">
        <input type="text" id="chat-input" placeholder="Gửi tin nhắn..." autocomplete="off" maxlength="150" />
        <button type="submit" class="btn-icon chat-send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        </button>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
